# Tag-only publish to GitHub Packages.
#
# Uses GITHUB_TOKEN (packages: write). Optional PAT: secrets.NODE_AUTH_TOKEN on both
# setup-node and publish steps if you override the default.
name: Publish package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://npm.pkg.github.com
          scope: "@llanesleonardo"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke CLI
        run: node bin/create-saas.mjs --help

      - name: Inspect tarball
        run: npm pack --dry-run

      - name: Verify tag matches package.json
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG pkg=$PKG"
          test "$TAG" = "$PKG"

      - name: Publish
        run: npm publish --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
